version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: var-naming
        - name: error-return
        - name: unexported-return
        - name: blank-imports
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck]
