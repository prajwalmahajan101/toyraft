# golangci-lint configuration for toyraft.
#
# Schema: v1 (matches the `golangci-lint-action@v6 + version: latest` binary
# served on GitHub Actions runners). The v2 schema is not yet accepted by
# that pinned version; revisit when ADR-0003 is updated.
#
# Policy:
#   - Correctness findings (govet, errcheck, staticcheck, ineffassign, unused)
#     are BLOCKING.
#   - Style findings (revive, misspell) are advisory but enforced in CI to
#     keep diffs clean.
#   - gosec deliberately excluded — see docs/adr/0003-golangci-lint-config.md
#     (false-positive rate too high for math/rand-with-seeds patterns).

run:
  timeout: 5m
  tests: true
  # Analysis target matches go.mod. The CI workflow uses
  # install-mode: goinstall so golangci-lint is built from source with
  # the runner's Go 1.26 toolchain (the prebuilt binary cannot parse
  # 1.26 source).
  go: '1.26'

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: error-return
      - name: unexported-return
      - name: blank-imports

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
