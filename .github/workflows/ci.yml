# ToyRaft CI — see docs/adr/0002-bring-ci-forward.md
#
# Four jobs: lint, test (matrix), commitlint, build (cross-compile).
# Required-check names are enumerated verbatim in ADR-0002; branch protection
# in plan 04 references those names. If you rename a job's `name:` field
# below, update ADR-0002 in the same commit.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned to a v1 release because the action's `version: latest`
          # flips between v1 and v2 binaries across runs (the v2 module
          # path differs), and our `.golangci.yml` follows the v1 schema
          # (sibling parity with toymq + toykv). Revisit when ADR-0003
          # migrates to v2.
          version: v1.62.0
          # goinstall mode is REQUIRED for Go 1.26 source — the prebuilt
          # binary ships compiled with Go 1.24 and cannot parse 1.26
          # packages (Pitfall 1, sibling-verbatim invariant).
          install-mode: goinstall
          args: --timeout=5m

  test:
    name: test (${{ matrix.os }} / go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.25.x', '1.26.x']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt would reformat:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -timeout 5m ./...

      - name: Test (raftdebug build tag — invariant negative tests)
        # Per ADR-0004 + .planning/phases/02-foundations/02-RESEARCH.md §6.3 /
        # Q4: SC4 (Phase 2) requires debug-build invariant assertions; this
        # step actually runs them so the scaffold is enforced by CI, not just
        # documented. NO `if:` modifier — SC4 is a correctness gate and must
        # run on BOTH push and pull_request events (contrast with the fuzz
        # step from plan 02-06 which IS gated to pull_request only).
        run: go test -tags raftdebug -race -timeout 5m ./pkg/raft

      - name: Fuzz (Log surface, PR only — RFC-0002)
        # Per RFC-0002 + .planning/phases/02-foundations/02-06-PLAN.md: fuzz
        # the *Log surface (FOUND-02 methods only) on PRs. Push-to-main is
        # exempt to keep main CI fast; the gate already fired on the PR.
        # Step lives INSIDE the existing `test` job so no new top-level
        # required-status-check name is introduced (branch-protection
        # contexts set live via `gh api PUT` in Phase 1.1 remain unchanged).
        if: github.event_name == 'pull_request'
        # Go's -fuzz= flag must match exactly one fuzz function per
        # invocation; run each target in series. 30s per target is the
        # RFC-0002 PR budget.
        run: |
          go test -run=^$ -fuzz=^FuzzLogAppendTruncate$ -fuzztime=30s ./pkg/raft
          go test -run=^$ -fuzz=^FuzzLogMatch$ -fuzztime=30s ./pkg/raft

  commitlint:
    name: commitlint
    # PR-only: push to main is post-merge, the gate already fired.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # wagoid walks the PR commit range; full history required so
          # force-pushes + merge commits are handled correctly.
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6

  build:
    name: build (cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: cross-compile matrix
        # Single-runner env-var loop instead of strategy.matrix: cross-compile
        # is a compile-only check; spinning four runners just to invoke the
        # cross-compiler is wasteful. Justified in ADR-0002.
        run: |
          set -euo pipefail
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS=${target%/*} GOARCH=${target#*/} go build ./...
          done
